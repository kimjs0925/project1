<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아침대화</title>
  <link rel="stylesheet" href="/morning-style.css?v=20260701-concept-fidelity" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>아침대화</h1>
          <p class="subtitle">학생은 번호를 고르고 콩이와 말로 대화해요. 교사는 관리자 페이지에서 결과를 모아 볼 수 있어요.</p>
        </div>
      </div>
      <span class="pill">기록은 이 브라우저에 저장돼요</span>
    </header>

    <section class="home-grid" aria-label="아침대화 시작">
      <article class="card home-card">
        <div>
          <h2>학생창</h2>
          <p>자기 번호와 숫자 3자리 비밀번호로 들어가서 수면, 아침밥, 특이사항, 아침기분, 친구와의 일을 콩이와 말로 나눠요.</p>
        </div>
        <a class="btn primary" href="/morning/student">학생창 열기</a>
      </article>

      <article class="card home-card">
        <div>
          <h2>관리자 페이지</h2>
          <p>여러 학생의 아침 대화 결과를 한눈에 보고, 전체 요약 리포트와 CSV를 다운로드해요. 처음 열 때 관리자 비밀번호를 정해요.</p>
        </div>
        <a class="btn" href="/morning/admin">관리자 페이지 열기</a>
      </article>
    </section>
  </main>
</body>
</html>
